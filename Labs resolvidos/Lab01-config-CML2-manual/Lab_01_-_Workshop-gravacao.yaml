    color: '#808080FF'
    rotation: 0
    text_bold: false
    text_content: |-
      Instruções.
      Todos routers são IOL-XE.
      1) Endereço IPv4 dos links
      10.x.y.0/24, onde x < são os números dos routers
      2) Loopback: uma para cada roteador
      x.x.x.x/32 onde x é o número do router
      3) OSPF area 0 em todos links.
    text_font: monospace
    text_italic: false
    text_size: 12
    text_unit: pt
    thickness: 1
    type: text
    x1: 0.0
    y1: -320.0
    z_index: 0
